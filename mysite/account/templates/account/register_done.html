{% extends "blog/base.html" %}

{% block title %}Welcome{% endblock %}

{% block content %}
    <div class="text-center">
        <h1 class="text-3xl font-bold tracking-tight text-gray-900 mb-4">Welcome {{ new_user.first_name }}!</h1>
        <p class="text-gray-600 mb-8">Your account has been successfully created.</p>
        <p>
            <a href="{% url 'login' %}" class="inline-flex items-center rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500">Log In Now</a>
        </p>
    </div>
{% endblock %}

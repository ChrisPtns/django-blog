{% extends "blog/base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
    <h1 class="text-3xl font-bold tracking-tight text-gray-900 text-center mb-8">Register</h1>
    <div class="max-w-sm mx-auto bg-white p-6 rounded-lg shadow-md border">
        <p class="mb-4 text-sm text-gray-600 text-center">Create a new account.</p>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in user_form %}
                <div>
                    <label class="block text-sm font-medium text-gray-700">{{ field.label_tag }}</label>
                    <div class="mt-1">
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <p class="text-sm text-red-600 mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Register</button>
        </form>
    </div>
{% endblock %}

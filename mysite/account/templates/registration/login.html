{% extends "blog/base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
    <h1 class="text-3xl font-bold tracking-tight text-gray-900 text-center mb-8">Log In</h1>
    <div class="max-w-sm mx-auto bg-white p-6 rounded-lg shadow-md border">
        {% if form.errors %}
            <p class="text-red-500 text-sm mb-4">Your username and password didn't match. Please try again.</p>
        {% endif %}

        <form method="post" action="{% url 'login' %}" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="{{ form.username.id_for_label }}" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" name="username" id="{{ form.username.id_for_label }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border px-3 py-2">
            </div>
            <div>
                <label for="{{ form.password.id_for_label }}" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" id="{{ form.password.id_for_label }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border px-3 py-2">
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Log In</button>
        </form>
        
        <div class="mt-4 text-center text-sm text-gray-600 space-y-2">
            <p><a href="{% url 'password_reset' %}" class="font-medium text-blue-600 hover:text-blue-500">Forgot your password?</a></p>
            <p>Don't have an account? <a href="{% url 'register' %}" class="font-medium text-blue-600 hover:text-blue-500">Register here</a></p>
        </div>
    </div>
{% endblock %}

{% extends "blog/base.html" %}
{% block title %}Reset your password{% endblock %}
{% block content %}
<h1 class="text-3xl font-bold tracking-tight text-gray-900 text-center mb-8">Reset Your Password</h1>
<div class="max-w-sm mx-auto bg-white p-6 rounded-lg shadow-md border text-center">
    <p class="mb-4 text-sm text-gray-600">Enter your email address to receive password reset instructions.</p>
    <form method="post" class="space-y-4 text-left">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700">Email:</label>
            <input type="email" name="email" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border px-3 py-2" required>
        </div>
        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Reset Password</button>
    </form>
</div>
{% endblock %}

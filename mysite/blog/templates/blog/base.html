{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}{% endblock %}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    #header {
      background-color: #333;
      color: #fff;
      padding: 10px 20px;
    }
    #header a {
      color: #fff;
      text-decoration: none;
      font-size: 24px;
      font-weight: bold;
    }
    #content {
      padding: 20px;
      max-width: 800px;
      margin: 20px auto;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div id="header">
    <a href="{% url 'blog:post_list' %}">My Blog</a>
  </div>
  <div id="content">
    {% block content %}
    {% endblock %}
  </div>
</body>
</html>
